services:
  - type: web
    name: tigertyres
    runtime: node
    nodeVersion: "20.19.2"
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: uploads
      mountPath: /opt/render/project/src/frontend/public/uploads
      sizeGB: 1
